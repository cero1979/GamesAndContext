name: Reproduce paper

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-lock.txt
      - run: python -m pip install -e .
      - run: python scripts/build_notebook.py
      - run: python scripts/run_all.py
      - name: Verify committed artifacts
        run: git diff --exit-code -- results notebooks/reproduce_context_dependent_benefit_loss_games_v09.ipynb
